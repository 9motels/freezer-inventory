<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freezer Inventory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #2b6cb0, #4299e1);
      color: white;
      padding: 1.25rem 1.5rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 0.25rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* Add Item Form */
    .add-form {
      background: white;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .add-form h2 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
      color: #2b6cb0;
    }

    .form-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .form-row input[type="text"] {
      flex: 1;
      min-width: 160px;
      padding: 0.6rem 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .form-row input[type="text"]:focus {
      outline: none;
      border-color: #4299e1;
    }

    .form-row input[type="number"] {
      width: 70px;
      padding: 0.6rem 0.5rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      text-align: center;
    }

    .form-row input[type="number"]:focus {
      outline: none;
      border-color: #4299e1;
    }

    .form-row select {
      padding: 0.6rem 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      background: white;
      min-width: 180px;
    }

    .form-row select:focus {
      outline: none;
      border-color: #4299e1;
    }

    .btn {
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-add {
      background: #48bb78;
      color: white;
    }

    .btn-add:hover { background: #38a169; }

    .btn-minus {
      background: #fc8181;
      color: white;
      width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border-radius: 6px;
    }

    .btn-minus:hover { background: #f56565; }

    .btn-plus {
      background: #68d391;
      color: white;
      width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border-radius: 6px;
    }

    .btn-plus:hover { background: #48bb78; }

    .btn-delete {
      background: #e53e3e;
      color: white;
      width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      border-radius: 6px;
    }

    .btn-delete:hover { background: #c53030; }

    /* Freezer Tabs */
    .tabs {
      display: flex;
      gap: 0.35rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
      -webkit-overflow-scrolling: touch;
    }

    .tab {
      padding: 0.5rem 1rem;
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      position: relative;
    }

    .tab:hover { border-color: #4299e1; }

    .tab.active {
      background: #4299e1;
      color: white;
      border-color: #4299e1;
    }

    .tab .tab-count {
      display: inline-block;
      background: rgba(0,0,0,0.15);
      border-radius: 10px;
      padding: 0.1rem 0.45rem;
      font-size: 0.75rem;
      margin-left: 0.35rem;
    }

    .tab.active .tab-count {
      background: rgba(255,255,255,0.25);
    }

    /* Items List */
    .freezer-content {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .freezer-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .freezer-header h2 {
      font-size: 1.1rem;
    }

    .freezer-header .item-total {
      font-size: 0.85rem;
      color: #718096;
    }

    .search-bar {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .search-bar input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .search-bar input:focus {
      outline: none;
      border-color: #4299e1;
    }

    .items-list {
      list-style: none;
    }

    .items-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #f7fafc;
      transition: background 0.15s;
    }

    .items-list li:hover {
      background: #f7fafc;
    }

    .items-list li:last-child {
      border-bottom: none;
    }

    .item-name {
      flex: 1;
      font-size: 0.95rem;
    }

    .item-qty {
      font-size: 1rem;
      font-weight: 700;
      min-width: 32px;
      text-align: center;
      margin: 0 0.5rem;
      color: #2b6cb0;
    }

    .item-actions {
      display: flex;
      gap: 0.3rem;
      align-items: center;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #a0aec0;
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #2d3748;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* All Items view */
    .freezer-label {
      font-size: 0.75rem;
      color: #718096;
      background: #edf2f7;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      margin-right: 0.5rem;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .form-row select, .form-row input[type="text"] { min-width: 100%; }
      .form-row input[type="number"] { width: 100%; }
      .tab { font-size: 0.8rem; padding: 0.45rem 0.75rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Freezer Inventory</h1>
  <p id="totalSummary"></p>
</header>

<div class="container">
  <!-- Add Item Form -->
  <div class="add-form">
    <h2>Add Item</h2>
    <div class="form-row">
      <input type="text" id="itemName" placeholder="Item name (e.g. Chicken Breast)" autocomplete="off">
      <input type="number" id="itemQty" value="1" min="1" max="999">
      <select id="itemFreezer"></select>
      <button class="btn btn-add" onclick="addItem()">Add</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Content -->
  <div class="freezer-content">
    <div class="freezer-header">
      <h2 id="freezerTitle">All Freezers</h2>
      <span class="item-total" id="freezerTotal"></span>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search items..." oninput="renderItems()">
    </div>
    <ul class="items-list" id="itemsList"></ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const FREEZERS = [
    'Kitchen',
    'Laundry Standup',
    'Laundry Small',
    'Basement Chest Left',
    'Basement Chest Right'
  ];

  let inventory = loadInventory();
  let activeTab = 'all';

  function loadInventory() {
    try {
      const data = localStorage.getItem('freezerInventory');
      return data ? JSON.parse(data) : {};
    } catch {
      return {};
    }
  }

  function saveInventory() {
    localStorage.setItem('freezerInventory', JSON.stringify(inventory));
  }

  // Build a key for each item: freezer + normalized name
  function itemKey(freezer, name) {
    return freezer + '||' + name.trim().toLowerCase();
  }

  function addItem() {
    const nameInput = document.getElementById('itemName');
    const qtyInput = document.getElementById('itemQty');
    const freezerSelect = document.getElementById('itemFreezer');

    const name = nameInput.value.trim();
    const qty = parseInt(qtyInput.value) || 1;
    const freezer = freezerSelect.value;

    if (!name) {
      nameInput.focus();
      return;
    }

    const key = itemKey(freezer, name);

    if (inventory[key]) {
      inventory[key].qty += qty;
    } else {
      inventory[key] = {
        name: name,
        freezer: freezer,
        qty: qty,
        added: Date.now()
      };
    }

    saveInventory();
    showToast(`Added ${qty}x ${name} to ${freezer}`);
    nameInput.value = '';
    qtyInput.value = '1';
    nameInput.focus();

    // Switch to the freezer we just added to
    activeTab = freezer;
    render();
  }

  function adjustQty(key, delta) {
    if (!inventory[key]) return;

    inventory[key].qty += delta;

    if (inventory[key].qty <= 0) {
      const name = inventory[key].name;
      const freezer = inventory[key].freezer;
      delete inventory[key];
      showToast(`Removed ${name} from ${freezer}`);
    } else {
      const action = delta > 0 ? 'Added' : 'Removed';
      showToast(`${action} 1x ${inventory[key].name}`);
    }

    saveInventory();
    render();
  }

  function deleteItem(key) {
    if (!inventory[key]) return;
    const name = inventory[key].name;
    const freezer = inventory[key].freezer;
    delete inventory[key];
    saveInventory();
    showToast(`Removed all ${name} from ${freezer}`);
    render();
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function getItemsForFreezer(freezer) {
    return Object.entries(inventory).filter(([_, item]) =>
      freezer === 'all' || item.freezer === freezer
    );
  }

  function getTotalItems(freezer) {
    return getItemsForFreezer(freezer).reduce((sum, [_, item]) => sum + item.qty, 0);
  }

  function getUniqueItems(freezer) {
    return getItemsForFreezer(freezer).length;
  }

  function renderTabs() {
    const tabsEl = document.getElementById('tabs');
    let html = '';

    // All tab
    const allTotal = Object.values(inventory).reduce((s, i) => s + i.qty, 0);
    html += `<div class="tab ${activeTab === 'all' ? 'active' : ''}" onclick="switchTab('all')">
      All<span class="tab-count">${allTotal}</span>
    </div>`;

    FREEZERS.forEach(f => {
      const total = getTotalItems(f);
      html += `<div class="tab ${activeTab === f ? 'active' : ''}" onclick="switchTab('${f}')">
        ${f}<span class="tab-count">${total}</span>
      </div>`;
    });

    tabsEl.innerHTML = html;
  }

  function renderItems() {
    const listEl = document.getElementById('itemsList');
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    const titleEl = document.getElementById('freezerTitle');
    const totalEl = document.getElementById('freezerTotal');

    titleEl.textContent = activeTab === 'all' ? 'All Freezers' : activeTab;

    let items = getItemsForFreezer(activeTab);

    if (search) {
      items = items.filter(([_, item]) => item.name.toLowerCase().includes(search));
    }

    // Sort alphabetically
    items.sort((a, b) => a[1].name.localeCompare(b[1].name));

    const totalQty = items.reduce((s, [_, i]) => s + i.qty, 0);
    totalEl.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}, ${totalQty} total`;

    if (items.length === 0) {
      listEl.innerHTML = `<div class="empty-state">
        <div class="icon">&#10052;</div>
        <p>${search ? 'No matching items found' : 'No items in this freezer yet'}</p>
      </div>`;
      return;
    }

    listEl.innerHTML = items.map(([key, item]) => `
      <li>
        <span class="item-name">
          ${activeTab === 'all' ? `<span class="freezer-label">${item.freezer}</span>` : ''}
          ${escapeHtml(item.name)}
        </span>
        <div class="item-actions">
          <button class="btn btn-minus" onclick="adjustQty('${escapeAttr(key)}', -1)" title="Remove one">-</button>
          <span class="item-qty">${item.qty}</span>
          <button class="btn btn-plus" onclick="adjustQty('${escapeAttr(key)}', 1)" title="Add one">+</button>
          <button class="btn btn-delete" onclick="deleteItem('${escapeAttr(key)}')" title="Remove all">&#x2715;</button>
        </div>
      </li>
    `).join('');
  }

  function render() {
    renderTabs();
    renderItems();
    updateSummary();
  }

  function updateSummary() {
    const total = Object.values(inventory).reduce((s, i) => s + i.qty, 0);
    const unique = Object.keys(inventory).length;
    document.getElementById('totalSummary').textContent =
      `${total} total items across ${FREEZERS.length} freezers`;
  }

  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('searchInput').value = '';
    render();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  // Populate freezer dropdown
  function initFreezerSelect() {
    const sel = document.getElementById('itemFreezer');
    FREEZERS.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f;
      sel.appendChild(opt);
    });
  }

  // Enter key to add
  document.getElementById('itemName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  // Init
  initFreezerSelect();
  render();
</script>

</body>
</html>
